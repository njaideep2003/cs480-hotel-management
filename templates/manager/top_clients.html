{% extends 'base.html' %}
{% block title %}Top Clients{% endblock %}
{% block content %}
<h1>Top Clients by Bookings</h1>
<div class="card" style="max-width:480px;">
  <form method="POST" style="display:flex; gap:1rem; align-items:flex-end;">
    <div class="field" style="flex:1;">
      <label>Show top K clients</label>
      <input type="number" name="k" min="1" max="100" value="{{ k }}">
    </div>
    <button type="submit" class="btn btn-primary">Run</button>
  </form>
</div>
{% if results %}
<div class="card" style="padding:0; overflow:hidden;">
  <table>
    <thead><tr><th>#</th><th>Name</th><th>Email</th><th>Bookings</th></tr></thead>
    <tbody>
    {% for i, r in results | enumerate %}
      <tr>
        <td style="color:var(--muted);">{{ i + 1 }}</td>
        <td>{{ r.name }}</td>
        <td>{{ r.email }}</td>
        <td><span class="badge badge-green">{{ r.booking_count }}</span></td>
      </tr>
    {% endfor %}
    </tbody>
  </table>
</div>
{% endif %}
{% endblock %}
